version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: state-ll-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: state_lessons
      POSTGRES_USER: state_admin
      POSTGRES_PASSWORD: ${DB_PASSWORD:-StateLL2024!}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U state_admin -d state_lessons"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: state-ll-backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://state_admin:${DB_PASSWORD:-StateLL2024!}@db:5432/state_lessons
      AUTH_MODE: ${AUTH_MODE:-local}
      AZURE_AD_TENANT_ID: ${AZURE_AD_TENANT_ID:-}
      AZURE_AD_CLIENT_ID: ${AZURE_AD_CLIENT_ID:-}
      AZURE_AD_CLIENT_SECRET: ${AZURE_AD_CLIENT_SECRET:-}
      JWT_SECRET: ${JWT_SECRET:-change-this-jwt-secret}
      SESSION_SECRET: ${SESSION_SECRET:-change-this-session-secret}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: state-ll-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
